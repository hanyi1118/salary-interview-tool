<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMT 面谈助手 — 调薪面谈记录工具 v2.1</title>
<style>
/* === CSS Variables === */
:root {
  --primary: #2563EB; --primary-hover: #1D4ED8; --primary-light: #EFF6FF;
  --secondary: #3B82F6; --accent: #059669;
  --bg: #F8FAFC; --fg: #0F172A; --card: #FFFFFF;
  --muted: #F1F5FD; --muted-fg: #64748B; --border: #E4ECFC;
  --sidebar-bg: #0F172A; --sidebar-text: #CBD5E1;
  --sidebar-muted: #94A3B8; --sidebar-icon: #64748B;
  --destructive: #DC2626;
  --text-subtle: #475569; --text-secondary: #334155;
  --font: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--fg); overflow: hidden; width: 100vw; height: 100vh; }

.app-wrapper {
  position: relative; width: 1440px; height: 900px; margin: 0 auto;
  transform-origin: top center;
}

/* ===== Screen Container ===== */
.screen {
  position: absolute; top: 0; left: 0; width: 1440px; height: 900px;
  display: flex; background: var(--bg); overflow: hidden; opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.screen.active { opacity: 1; pointer-events: auto; }

/* ===== Sidebar ===== */
.sidebar {
  width: 240px; min-width: 240px; background: var(--sidebar-bg);
  display: flex; flex-direction: column; padding: 24px; gap: 12px;
}
.sidebar-logo { color: #FFF; font-size: 20px; font-weight: 700; }
.sidebar-divider { height: 1px; background: rgba(255,255,255,0.1); }
.nav-item { display: flex; align-items: center; height: 44px; padding: 0 12px; gap: 8px; cursor: pointer; transition: background 0.15s; }
.nav-item.active { background: var(--primary); }
.nav-item:not(.active):hover { background: rgba(255,255,255,0.05); }
.nav-icon { width: 20px; height: 20px; }
.nav-item.active .nav-icon { background: #FFF; }
.nav-item:not(.active) .nav-icon { background: var(--sidebar-icon); }
.nav-text { font-size: 15px; font-weight: 400; flex: 1; }
.nav-item.active .nav-text { color: #FFF; font-weight: 500; }
.nav-item:not(.active) .nav-text { color: var(--sidebar-muted); }
.sidebar-spacer { flex: 1; }
.user-area { display: flex; align-items: center; height: 48px; padding: 8px; gap: 10px; }
.avatar { width: 32px; height: 32px; border-radius: 9999px; background: var(--secondary); }
.user-name { font-size: 14px; color: var(--sidebar-text); }

/* ===== Main Content ===== */
.main-content { flex: 1; display: flex; flex-direction: column; padding: 32px; gap: 24px; overflow-y: auto; }

.header-bar { display: flex; align-items: center; justify-content: space-between; height: 56px; flex-shrink: 0; }
.page-title { font-size: 28px; font-weight: 700; color: var(--fg); }
.header-detail { display: flex; align-items: center; gap: 16px; }
.btn-back { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--primary); font-family: var(--font); font-weight: 500; }
.btn-back:hover { text-decoration: underline; }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 6px; padding: 0 12px;
  font-size: 15px; font-weight: 500; cursor: pointer; border: none; outline: none;
  font-family: var(--font); transition: background 0.15s;
}
.btn-primary { height: 44px; min-width: 140px; background: var(--primary); color: #FFF; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { height: 32px; min-width: 80px; font-size: 13px; }
.btn-outline { height: 32px; min-width: 80px; font-size: 13px; background: none; border: 1px solid var(--border); color: var(--primary); }
.btn-outline:hover { background: var(--muted); }
.btn-icon { width: 18px; height: 18px; background: #FFF; }

/* ===== Stats Row ===== */
.stats-row { display: flex; gap: 20px; height: 100px; flex-shrink: 0; }
.stat-card { flex: 1; background: var(--card); display: flex; flex-direction: column; padding: 20px; gap: 8px; }
.stat-label { font-size: 13px; color: var(--muted-fg); }
.stat-value { font-size: 32px; font-weight: 700; color: var(--fg); }

/* ===== Filter Bar ===== */
.filter-bar { display: flex; align-items: center; gap: 16px; height: 48px; flex-shrink: 0; }
.search-box { display: flex; align-items: center; width: 320px; height: 44px; background: var(--card); padding: 0 12px; gap: 8px; }
.search-icon { width: 18px; height: 18px; background: var(--sidebar-muted); }
.search-input { flex: 1; font-size: 14px; color: var(--fg); border: none; outline: none; background: none; font-family: var(--font); }
.search-input::placeholder { color: var(--sidebar-muted); }
.filter-spacer { flex: 1; }

/* ===== Record List ===== */
.record-list { flex: 1; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.list-header { display: flex; align-items: center; height: 44px; padding: 0 12px; gap: 16px; flex-shrink: 0; }
.list-col { font-size: 12px; font-weight: 500; color: var(--muted-fg); }
.col-name { width: 140px; } .col-dept { width: 160px; } .col-date { width: 160px; } .col-status { width: 80px; } .col-note { flex: 1; }

.record-card {
  display: flex; align-items: center; height: 64px; padding: 0 12px; gap: 16px;
  background: var(--card); cursor: pointer; flex-shrink: 0; transition: background 0.15s;
}
.record-card:hover { background: var(--muted); }
.name-block { display: flex; flex-direction: column; width: 140px; gap: 2px; }
.name-edit {
  display: flex; align-items: center; gap: 6px; cursor: text;
}
.name-edit input {
  border: none; outline: none; font-size: 15px; font-weight: 500; font-family: var(--font);
  color: var(--fg); background: transparent; width: 100%; padding: 0;
  border-bottom: 2px solid transparent; transition: border-color 0.2s;
}
.name-edit input:focus { border-bottom-color: var(--primary); }
.name-edit input:hover:not(:focus) { border-bottom-color: var(--border); }
.edit-icon {
  display: none; width: 12px; height: 12px; background: var(--sidebar-muted);
  flex-shrink: 0; cursor: pointer;
}
.name-edit:hover .edit-icon { display: block; }
.record-dept { font-size: 12px; color: var(--sidebar-muted); width: 160px; display: flex; align-items: center; }
.record-dept input {
  border: none; outline: none; font-size: 12px; font-family: var(--font); color: var(--sidebar-muted);
  background: transparent; width: 100%; padding: 0; border-bottom: 2px solid transparent;
}
.record-dept input:focus { border-bottom-color: var(--primary); }
.record-date { font-size: 14px; color: var(--text-secondary); width: 160px; }
.record-date input {
  border: none; outline: none; font-size: 14px; font-family: var(--font); color: var(--text-secondary);
  background: transparent; width: 100%; padding: 0; border-bottom: 2px solid transparent;
}
.record-date input:focus { border-bottom-color: var(--primary); }
.status-select {
  width: 90px; height: 30px; padding: 2px 4px; font-size: 12px; font-weight: 500; font-family: var(--font);
  border: 1px solid var(--border-color); border-radius: 4px; outline: none; cursor: pointer;
  background: #fff; color: var(--text-primary); text-align: center;
  -webkit-appearance: none; appearance: none;
}
.status-select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.record-note { flex: 1; min-width: 0; }
.record-note input {
  width: 100%; border: none; outline: none; font-size: 14px; font-family: var(--font);
  color: var(--text-subtle); background: transparent; padding: 2px 0;
  border-bottom: 1px solid transparent; transition: border-color 0.15s;
}
.record-note input:focus { border-bottom-color: var(--primary); color: var(--text-primary); }
.record-check {
  width: 18px; height: 18px; margin-right: 8px; flex-shrink: 0;
  accent-color: var(--primary); cursor: pointer;
}
.btn-delete {
  width: 28px; height: 28px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--sidebar-muted); border-radius: 0;
  transition: all 0.15s;
}
.btn-delete:hover { color: var(--destructive); background: #FEF2F2; }

/* ===== Detail Panel ===== */
.detail-panel {
  flex: 1; display: flex; flex-direction: column; overflow-y: auto; gap: 20px;
  padding: 0 0 24px 0;
}
.detail-section {
  background: var(--card); display: flex; flex-direction: column; padding: 24px; gap: 16px;
}
.detail-section-title {
  font-size: 18px; font-weight: 700; color: var(--fg);
  border-bottom: 2px solid var(--border); padding-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.detail-table { width: 100%; border-collapse: collapse; }
.detail-table td {
  padding: 10px 12px; font-size: 14px; vertical-align: top;
  border-bottom: 1px solid var(--border);
}
.detail-table td:first-child { width: 160px; color: var(--muted-fg); font-weight: 500; white-space: nowrap; }
.detail-table td:last-child { color: var(--fg); }
.detail-table td textarea, .detail-table td input[type="text"] {
  width: 100%; border: 1px solid transparent; outline: none; font-size: 14px;
  font-family: var(--font); color: var(--fg); background: var(--bg); padding: 6px 8px;
  resize: vertical; min-height: 28px;
}
.detail-table td textarea:focus, .detail-table td input[type="text"]:focus { border-color: var(--primary); }
.detail-table td .readonly-text { padding: 6px 8px; white-space: pre-wrap; line-height: 1.6; min-height: 28px; }

.action-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; gap: 12px; position: sticky; bottom: 0; background: var(--bg);
}
.btn-group { display: flex; gap: 12px; }

.info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.info-item { display: flex; flex-direction: column; gap: 4px; }
.info-label { font-size: 12px; color: var(--muted-fg); font-weight: 500; }
.info-value { font-size: 14px; color: var(--fg); padding: 6px 8px; background: var(--bg); min-height: 32px; border: 1px solid transparent; }
.info-value:focus { border-color: var(--primary); outline: none; }
.info-value-readonly { font-size: 14px; color: var(--fg); padding: 6px 8px; min-height: 32px; }

.followup-list { display: flex; flex-direction: column; gap: 8px; }
.followup-item {
  display: flex; align-items: center; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border);
}
.followup-item:last-child { border-bottom: none; }
.followup-task { flex: 1; font-size: 14px; color: var(--fg); }
.followup-person { width: 120px; font-size: 14px; color: var(--fg); }
.followup-date { width: 100px; font-size: 14px; color: var(--fg); }
.followup-status { width: 60px; text-align: center; }
.followup-checkbox { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

/* checkbox/radio option groups */
.chk-group { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; min-height: 28px; }
.chk-option { font-size: 14px; color: var(--muted-fg); }
.chk-option.chk-sel { color: var(--fg); font-weight: 500; }
.chk-label { display: flex; align-items: center; gap: 4px; font-size: 14px; cursor: pointer; color: var(--fg); user-select: none; }
.chk-label input[type="radio"] { accent-color: var(--primary); width: 16px; height: 16px; margin: 0; }

/* Hints */
.hint-tag {
  font-size: 12px; font-weight: 400; color: var(--primary);
  cursor: pointer; margin-left: 12px; user-select: none;
  white-space: nowrap;
}
.hint-tag:hover { text-decoration: underline; }
.hint-detail {
  font-size: 13px; color: var(--muted-fg); line-height: 1.6;
  padding: 12px 16px; margin-bottom: 8px;
  background: var(--primary-light); border-left: 3px solid var(--primary);
}
.hint-inline {
  display: block; font-size: 12px; color: var(--sidebar-muted);
  margin-top: 4px; font-style: italic;
}

.edit-input {
  border: none; border-bottom: 2px solid transparent; outline: none;
  font-size: 14px; font-family: var(--font); color: var(--fg); background: transparent;
  padding: 2px 0; width: 100%;
}
.edit-input:focus { border-bottom-color: var(--primary); }

/* ===== Modal Overlay ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg); width: 1100px; max-height: 85vh; border-radius: 0;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 2px solid var(--border); background: var(--card);
}
.modal-title { font-size: 20px; font-weight: 700; color: var(--fg); }
.modal-close {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px; color: var(--muted-fg); background: none; border: none;
}
.modal-close:hover { background: var(--muted); color: var(--fg); }
.modal-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.modal-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-top: 2px solid var(--border); background: var(--card);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }
::-webkit-scrollbar-thumb:hover { background: var(--sidebar-muted); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--fg); color: #FFF; padding: 12px 24px; font-size: 14px;
  font-family: var(--font); opacity: 0; transition: opacity 0.3s; z-index: 2000;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app-wrapper" id="app">

  <!-- ======================== SCREEN 1: Record List ======================== -->
  <div class="screen active" id="screen-list">
    <div class="sidebar">
      <div class="sidebar-logo">SMT 面谈助手</div>
      <div class="sidebar-divider"></div>
      <div class="nav-item active" data-target="list">
        <div class="nav-icon"></div><span class="nav-text">谈话记录</span>
      </div>
      <div class="nav-item" data-target="form" onclick="openNewRecord()">
        <div class="nav-icon"></div><span class="nav-text">新建谈话</span>
      </div>
      <div class="sidebar-spacer"></div>
        <div class="user-area">
        <div class="avatar"></div><span class="user-name">SMT财务</span>
      </div>
    </div>
    <div class="main-content">
      <div class="header-bar">
        <span class="page-title">谈话记录</span>
        <div class="btn-group">
          <button class="btn btn-outline btn-sm" onclick="toggleSelectAll()" style="height:44px;margin-right:4px;" id="btnSelectAll">全选</button>
          <button class="btn btn-outline btn-sm" onclick="exportSelected()" style="height:44px;margin-right:4px;">导出选中</button>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()" style="height:44px;margin-right:4px;">导入</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSelected(this)">
          <button class="btn btn-primary" onclick="openNewRecord()"><div class="btn-icon"></div><span>新建谈话</span></button>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">谈话总数</span><span class="stat-value">10</span></div>
        <div class="stat-card"><span class="stat-label">待访谈</span><span class="stat-value">1</span></div>
        <div class="stat-card"><span class="stat-label">进行中</span><span class="stat-value">0</span></div>
        <div class="stat-card"><span class="stat-label">已完成</span><span class="stat-value">9</span></div>
      </div>
      <div class="filter-bar">
        <div class="search-box">
          <div class="search-icon"></div>
          <input class="search-input" placeholder="搜索员工姓名或岗位..." oninput="filterRecords()" id="searchInput">
        </div>
        <div class="filter-spacer"></div>
      </div>
      <div class="list-header">
        <span class="list-col col-name">员工姓名</span>
        <span class="list-col col-dept">所在岗位</span>
        <span class="list-col col-date">对应主体</span>
        <span class="list-col col-status">状态</span>
        <span class="list-col col-note">关键摘要</span>
      </div>
      <div class="record-list" id="recordList"></div>
    </div>
  </div>

</div>

<!-- ===== Detail Modal ===== -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">访谈记录</span>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <span style="font-size:12px;color:var(--muted-fg);" id="modalInfo"></span>
      <div class="btn-group">
        <button class="btn btn-primary btn-sm" id="btnEditSave" onclick="toggleEditMode()">编辑</button>
        <button class="btn btn-outline btn-sm" style="display:none;" id="btnCancel" onclick="cancelEdit()">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
// ==============================
// DATA: 5 Employee Interview Records
// ==============================
let EMPLOYEES = [

    date: '2026-06-08', status: '已完成', statusType: 'done',

let currentEmployeeId = null;
let isEditMode = false;
let originalData = null;
var CLOUD_URL = 'https://jsonblob.com/api/jsonBlob/019ec98f-d52a-78f8-a152-963ecfdd4610';

// Load: try cloud first, fallback to localStorage
function loadData() {
  fetch(CLOUD_URL).then(function(r){ return r.json(); }).then(function(d){
    try {
      var arr;
      if (Array.isArray(d) && d.length > 0 && d[0].id) {
        arr = d;
      } else if (d && d.data) {
        arr = (new Function('return ' + d.data))();
      }
      if (arr && arr.length > 0 && arr[0].id) {
        EMPLOYEES = arr;
        localStorage.setItem('smt_interview_data', JSON.stringify(EMPLOYEES));
        renderRecordList();
      }
    } catch(e) {}
  }).catch(function(){});
}

// Fallback: localStorage
var savedData = localStorage.getItem('smt_interview_data');
if (savedData) {
  try { EMPLOYEES = JSON.parse(savedData); } catch(e) {}
}

function saveToStorage() {
  localStorage.setItem('smt_interview_data', JSON.stringify(EMPLOYEES));
  showToast('已保存到本地');
}

// ==============================
// RENDER RECORD LIST
// ==============================
function renderRecordList(filter = '') {
  const list = document.getElementById('recordList');
  if (!list) { console.error('recordList element not found!'); return; }
  const q = filter.toLowerCase();
  const filtered = EMPLOYEES.filter(e =>
    e.name.toLowerCase().includes(q) ||
    e.dept.toLowerCase().includes(q) ||
    e.entities.toLowerCase().includes(q)
  );
  console.log('renderRecordList: EMPLOYEES=' + EMPLOYEES.length + ', filtered=' + filtered.length);

  // Build HTML manually to avoid template literal escaping issues
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var selP = e.statusType === 'pending' ? ' selected' : '';
    var selA = e.statusType === 'active' ? ' selected' : '';
    var selD = e.statusType === 'done' ? ' selected' : '';
    html += '<div class="record-card" onclick="openDetail(' + e.id + ')">';
    html += '<input type="checkbox" class="record-check" data-id="' + e.id + '" onclick="event.stopPropagation()" title="选择">';
    html += '<div class="name-block">';
    html += '<div class="name-edit" onclick="event.stopPropagation()">';
    html += '<input value="' + escHtml(e.name) + '" onchange="updateEmployeeName(' + e.id + ', this.value)" title="点击编辑姓名">';
    html += '<div class="edit-icon" title="编辑姓名"></div></div>';
    html += '<div class="record-dept" onclick="event.stopPropagation()">';
    html += '<input value="' + escHtml(e.dept) + '" onchange="updateEmployeeField(' + e.id + ', \'dept\', this.value)" title="点击编辑岗位">';
    html += '</div></div>';
    html += '<div class="record-date" onclick="event.stopPropagation()">';
    html += '<input value="' + escHtml(e.entities) + '" onchange="updateEmployeeField(' + e.id + ', \'entities\', this.value)" title="点击编辑主体">';
    html += '</div>';
    html += '<div class="record-date" onclick="event.stopPropagation()">';
    html += '<input value="' + escHtml(e.date) + '" onchange="updateEmployeeField(' + e.id + ', \'date\', this.value)" title="点击编辑日期">';
    html += '</div>';
    html += '<select class="status-select" onchange="updateEmployeeStatus(' + e.id + ', this.value)" onclick="event.stopPropagation()" title="选择状态">';
    html += '<option value="pending"' + selP + '>待访谈</option>';
    html += '<option value="active"' + selA + '>进行中</option>';
    html += '<option value="done"' + selD + '>已完成</option>';
    html += '</select>';
    html += '<div class="record-note" onclick="event.stopPropagation()">';
    html += '<input value="' + escHtml(e.summary) + '" onchange="updateEmployeeSummary(' + e.id + ', this.value)" title="点击编辑关键摘要" placeholder="输入关键摘要...">';
    html += '</div>';
    html += '<button class="btn-delete" onclick="event.stopPropagation();deleteEmployee(' + e.id + ')" title="删除">\u00D7</button>';
    html += '</div>';
  }
  list.innerHTML = html;

  var total = EMPLOYEES.length;
  var pending = EMPLOYEES.filter(function(e){ return e.statusType === 'pending'; }).length;
  var active = EMPLOYEES.filter(function(e){ return e.statusType === 'active'; }).length;
  var done = EMPLOYEES.filter(function(e){ return e.statusType === 'done'; }).length;
  document.querySelector('#screen-list .stats-row').innerHTML =
    '<div class="stat-card"><span class="stat-label">谈话总数</span><span class="stat-value">' + total + '</span></div>' +
    '<div class="stat-card"><span class="stat-label">待访谈</span><span class="stat-value">' + pending + '</span></div>' +
    '<div class="stat-card"><span class="stat-label">进行中</span><span class="stat-value">' + active + '</span></div>' +
    '<div class="stat-card"><span class="stat-label">已完成</span><span class="stat-value">' + done + '</span></div>';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateEmployeeName(id, newName) {
  const emp = EMPLOYEES.find(e => e.id === id);
  if (emp && newName.trim()) {
    emp.name = newName.trim();
    renderRecordList(document.getElementById('searchInput')?.value || '');
    saveToStorage();
    showToast('员工姓名已更新');
  }
}

function updateEmployeeField(id, field, value) {
  const emp = EMPLOYEES.find(e => e.id === id);
  if (emp && value.trim()) {
    emp[field] = value.trim();
    renderRecordList(document.getElementById('searchInput')?.value || '');
    saveToStorage();
    showToast('信息已更新');
  }
}

function updateEmployeeStatus(id, newType) {
  const emp = EMPLOYEES.find(e => e.id === id);
  if (emp) {
    emp.statusType = newType;
    emp.status = newType === 'done' ? '已完成' : (newType === 'active' ? '进行中' : '待访谈');
    renderRecordList(document.getElementById('searchInput')?.value || '');
    saveToStorage();
    showToast('状态已更新');
  }
}

function updateEmployeeSummary(id, value) {
  const emp = EMPLOYEES.find(e => e.id === id);
  if (emp) {
    emp.summary = value.trim();
    saveToStorage();
    showToast('摘要已更新');
  }
}

function filterRecords() {
  const q = document.getElementById('searchInput').value;
  renderRecordList(q);
}

function deleteEmployee(id) {
  var emp = EMPLOYEES.find(function(e){ return e.id === id; });
  if (!emp) return;
  if (!confirm('确定要删除「' + emp.name + '」的访谈记录吗？此操作不可撤销。')) return;
  EMPLOYEES = EMPLOYEES.filter(function(e){ return e.id !== id; });
  saveToStorage();
  renderRecordList(document.getElementById('searchInput')?.value || '');
  showToast('已删除「' + emp.name + '」');
}

// ==============================
// DETAIL MODAL
// ==============================
function openDetail(id) {
  currentEmployeeId = id;
  isEditMode = false;
  const emp = EMPLOYEES.find(e => e.id === id);
  if (!emp) return;
  originalData = JSON.parse(JSON.stringify(emp));

  document.getElementById('modalTitle').textContent = '访谈记录 — ' + emp.name;
  document.getElementById('btnEditSave').textContent = '编辑';
  document.getElementById('btnEditSave').className = 'btn btn-outline btn-sm';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('modalInfo').textContent = emp.date + ' · 面谈人：' + emp.basicInfo.interviewer;

  renderDetailContent(emp, false);
  document.getElementById('detailModal').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
  currentEmployeeId = null;
  isEditMode = false;
  renderRecordList(document.getElementById('searchInput')?.value || '');
}

function toggleEditMode() {
  const emp = EMPLOYEES.find(e => e.id === currentEmployeeId);
  if (!emp) return;

  if (!isEditMode) {
    isEditMode = true;
    originalData = JSON.parse(JSON.stringify(emp));
    document.getElementById('btnEditSave').textContent = '保存';
    document.getElementById('btnEditSave').className = 'btn btn-primary btn-sm';
    document.getElementById('btnCancel').style.display = 'inline-flex';
    renderDetailContent(emp, true);
  } else {
    saveDetailChanges();
    isEditMode = false;
    document.getElementById('btnEditSave').textContent = '编辑';
    document.getElementById('btnEditSave').className = 'btn btn-outline btn-sm';
    document.getElementById('btnCancel').style.display = 'none';
    renderDetailContent(emp, false);
    showToast('访谈记录已保存');
  }
}

function cancelEdit() {
  const emp = EMPLOYEES.find(e => e.id === currentEmployeeId);
  if (!emp || !originalData) return;
  Object.assign(emp, originalData);
  isEditMode = false;
  document.getElementById('btnEditSave').textContent = '编辑';
  document.getElementById('btnEditSave').className = 'btn btn-outline btn-sm';
  document.getElementById('btnCancel').style.display = 'none';
  renderDetailContent(emp, false);
}

function saveDetailChanges() {
  const emp = EMPLOYEES.find(e => e.id === currentEmployeeId);
  if (!emp) return;
  const body = document.getElementById('modalBody');
  const inputs = body.querySelectorAll('[data-field]');
  inputs.forEach(inp => {
    if (inp.type === 'radio' && !inp.checked) return;
    const path = inp.dataset.field.split('.');
    let obj = emp;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    obj[path[path.length - 1]] = inp.value;
  });
  const checks = body.querySelectorAll('[data-followup]');
  checks.forEach((chk, i) => {   emp.followup[i].done = chk.checked; });
  saveToStorage();
}

        <tr><td>管理者可以做什么来支持你</td><td>${area('career.supportQ', emp.career.supportQ, e)}<span class="hint-inline">引导：开放式提问，了解员工对上级和管理层的期望与需求。</span></td></tr>
      </table>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">三、公司方向传达</div>
      <table class="detail-table">
        <tr><td>公司/部门战略</td><td>${area('companyMsg.strategy', emp.companyMsg.strategy, e)}</td></tr>
        <tr><td>对团队期望</td><td>${area('companyMsg.teamExpectation', emp.companyMsg.teamExpectation, e)}</td></tr>
        <tr><td>对该员工定位</td><td>${area('companyMsg.positioning', emp.companyMsg.positioning, e)}</td></tr>
      </table>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">四、工作内容调整 <span class="hint-tag" onclick="toggleHint(this)">▸ 话术参考</span></div>
      <div class="hint-detail" style="display:none">调整方向尽量与员工职业规划挂钩，形成呼应。职责边界必须说清楚。涉及跨部门协作时，提前理清接口人和协作边界。不确定的部分直接说「这块我们还在设计中，后续再跟你同步」。</div>
      <table class="detail-table">
        <tr><td>调整前职责</td><td>${area('workAdjust.before', emp.workAdjust.before, e)}</td></tr>
        <tr><td>调整后职责</td><td>${area('workAdjust.after', emp.workAdjust.after, e)}</td></tr>
        <tr><td>新增职责</td><td>${area('workAdjust.newDuties', emp.workAdjust.newDuties, e, 3)}</td></tr>
        <tr><td>不再负责</td><td>${area('workAdjust.removed', emp.workAdjust.removed, e)}</td></tr>
        <tr><td>职责边界</td><td>${area('workAdjust.boundary', emp.workAdjust.boundary, e, 3)}</td></tr>
        <tr><td>协作接口人</td><td>${area('workAdjust.contacts', emp.workAdjust.contacts, e)}</td></tr>
        <tr><td>员工反馈</td><td>${fieldCheck(e, 'workAdjust.feedback', emp.workAdjust.feedback, ['接受','有顾虑','抵触'])}</td></tr>
      </table>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">五、调薪结果 <span class="hint-tag" onclick="toggleHint(this)">▸ 话术参考</span></div>
      <div class="hint-detail" style="display:none">先铺垫认可和方向，最后才报数字。把调薪和工作调整明确关联——「涨薪是因为你要做更多/更重的事」。不要用「争取来的」「帮你申请的」这类施恩话术。对方有异议时先听完理由，不当场讨价还价，说「你的想法我理解，我回去综合看一下」。</div>
      <table class="detail-table">
        <tr><td>调薪幅度</td><td>${field2('salary.finalRate', emp.salary.finalRate, e)}</td></tr>
        <tr><td>生效时间</td><td>${field2('salary.effectiveDate', emp.salary.effectiveDate, e)}</td></tr>
        <tr><td>调整薪资</td><td>${field2('salary.adjustedSalary', emp.salary.adjustedSalary, e)}</td></tr>
        <tr><td>员工反馈</td><td>${fieldCheck(e, 'salary.feedback', emp.salary.feedback, ['接受','低于预期','需后续沟通'])}</td></tr>
        <tr><td>备注</td><td>${area('salary.notes', emp.salary.notes, e)}</td></tr>
      </table>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">六、后续跟进</div>
      <div class="followup-list">
        ${emp.followup.map((f, i) => `
          <div class="followup-item">
            <span class="followup-task">${e ? '<input class="edit-input" data-field="followup.'+i+'.task" value="'+f.task+'" />' : f.task}</span>
            <span class="followup-person">${e ? '<input class="edit-input" data-field="followup.'+i+'.person" value="'+f.person+'" />' : f.person}</span>
            <span class="followup-date">${e ? '<input class="edit-input" data-field="followup.'+i+'.date" value="'+f.date+'" />' : f.date}</span>
            <span class="followup-status">${e ? '<input type="checkbox" class="followup-checkbox" data-followup="'+i+'" '+(f.done?'checked':'')+' />' : (f.done ? '已完成' : '待办')}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">七、面谈总结 <span class="hint-tag" onclick="toggleHint(this)">▸ 话术参考</span></div>
      <div class="hint-detail" style="display:none">总结共识（职业方向+职责边界+调薪），确认后续安排。「你不是在替我干活，你是在为自己积累。我希望你在SMT的每一天，都在为你的简历增加分量。」</div>
      <table class="detail-table">
        <tr><td>员工整体状态</td><td>${fieldCheck(e, 'summary2.overallState', emp.summary2.overallState, ['积极','稳定','迷茫','消极'])}</td></tr>
        <tr><td>发展规划清晰度</td><td>${fieldCheck(e, 'summary2.clarity', emp.summary2.clarity, ['清晰','有方向但模糊','不明确'])}</td></tr>
        <tr><td>对调整接受度</td><td>${fieldCheck(e, 'summary2.acceptance', emp.summary2.acceptance, ['高','中','低'])}</td></tr>
        <tr><td>核心关注点</td><td>${area('summary2.focus', emp.summary2.focus, e)}</td></tr>
        <tr><td>风险提示</td><td>${area('summary2.risk', emp.summary2.risk, e, 3)}</td></tr>
        <tr><td>面谈人备注</td><td>${area('summary2.notes', emp.summary2.notes, e)}</td></tr>
      </table>
    </div>
  `;
}

function field(label, dataField, value, editable) {
  return '<div class="info-item"><span class="info-label">'+label+'</span>'+(editable
    ? '<input class="info-value" data-field="'+dataField+'" value="'+value+'" />'
    : '<div class="info-value-readonly">'+(value||'—')+'</div>')+'</div>';
}

function field2(dataField, value, editable) {
  return editable ? '<input class="edit-input" data-field="'+dataField+'" value="'+(value||'')+'" style="width:100%;" />'
    : '<div class="readonly-text">'+(value||'—')+'</div>';
}

function area(dataField, value, editable, rows) {
  rows = rows || 2;
  return editable ? '<textarea data-field="'+dataField+'" style="width:100%;min-height:'+(rows*24)+'px;border:1px solid var(--border);outline:none;font-size:14px;font-family:var(--font);color:var(--fg);background:var(--bg);padding:6px 8px;resize:vertical;">'+(value||'')+'</textarea>'
    : '<div class="readonly-text">'+(value||'—')+'</div>';
}

function fieldCheck(editable, dataField, value, options) {
  var selected = value || '';
  if (!editable) {
    // 只读模式：高亮已选项
    var parts = [];
    for (var i = 0; i < options.length; i++) {
      var sel = selected.indexOf(options[i]) >= 0;
      parts.push('<span class="chk-option'+(sel?' chk-sel':'')+'">'+(sel?'●':'○')+' '+options[i]+'</span>');
    }
    return '<div class="readonly-text chk-group">'+parts.join(' ')+'</div>';
  }
  // 编辑模式：可点击 radio 组
  var idPrefix = dataField.replace(/\\./g,'_')+'_'+Math.random().toString(36).substr(2,6);
  var parts = [];
  for (var i = 0; i < options.length; i++) {
    var id = idPrefix+'_'+i;
    var sel = selected.indexOf(options[i]) >= 0;
    parts.push('<label class="chk-label"><input type="radio" name="'+idPrefix+'" value="'+options[i]+'" data-field="'+dataField+'" '+ (sel?'checked':'') +' /> '+options[i]+'</label>');
  }
  return '<div class="chk-group">'+parts.join('')+'</div>';
}

function openNewRecord() {
  // 创建空白模板作为新员工记录
  var newId = Math.max.apply(null, EMPLOYEES.map(function(e){return e.id;})) + 1;
  var newEmp = {
    id: newId,
    name: '新员工', dept: '请编辑岗位', entities: '请编辑主体',
    date: new Date().toISOString().slice(0,10), status: '进行中', statusType: 'active',
    summary: '新建谈话记录，点击编辑填写详情',
    basicInfo: { interviewer: '', currentSalary:'', lastAdjust:'', proposedAdjust: '' },
    performance: { core: '', highlights: '', improvements: '', collaboration: '' },
    career: { achievement:'', skills:'', direction:'', depth:'', willing:'', draining:'', resource:'', strengthQ:'', improveQ:'', supportQ:'' },
    companyMsg: { strategy: '', teamExpectation: '', positioning: '' },
    workAdjust: { before:'', after:'', newDuties:'', removed:'', boundary:'', contacts:'', feedback:'□ 接受 □ 有顾虑 □ 抵触', concern:'', resolution:'' },
    salary: { finalRate:'', effectiveDate:'', adjustedSalary:'', feedback:'□ 接受 □ 低于预期 □ 需后续沟通', notes:'' },
    followup: [
      { task:'发出书面调薪确认', person:'', date:'', done:false },
      { task:'发出调整后职责说明', person:'', date:'', done:false },
      { task:'1个月后回访', person:'', date:'', done:false }
    ],
    summary2: { overallState:'□ 积极 □ 稳定 □ 迷茫 □ 消极', clarity:'□ 清晰 □ 有方向但模糊 □ 不明确', acceptance:'□ 高 □ 中 □ 低', focus:'', risk:'', notes:'' }
  };
  EMPLOYEES.push(newEmp);
  saveToStorage();
  renderRecordList(document.getElementById('searchInput')?.value || '');
  openDetail(newId);
  // 自动进入编辑模式
  setTimeout(function(){ toggleEditMode(); }, 300);
  showToast('已创建新记录，请编辑详情');
}

function exportSelected() {
  var ids = getSelectedIds();
  if (ids.length === 0) { showToast('请先勾选要导出的记录'); return; }
  var selected = EMPLOYEES.filter(function(e){ return ids.indexOf(e.id) >= 0; });
  var data = JSON.stringify(selected, null, 2);
  var blob = new Blob([data], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '调薪面谈记录_部分_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('已导出 ' + selected.length + ' 条记录');
}

function getSelectedIds() {
  var checks = document.querySelectorAll('.record-check:checked');
  var ids = [];
  checks.forEach(function(c){ ids.push(parseInt(c.dataset.id)); });
  return ids;
}

function toggleSelectAll() {
  var checks = document.querySelectorAll('.record-check');
  var allChecked = checks.length > 0 && document.querySelectorAll('.record-check:checked').length === checks.length;
  checks.forEach(function(c){ c.checked = !allChecked; });
  document.getElementById('btnSelectAll').textContent = allChecked ? '全选' : '取消';
}

function importSelected(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) imported = [imported];
      if (imported.length === 0) throw new Error('Empty');
      
      // Merge: update existing by id, add new ones
      var added = 0, updated = 0;
      imported.forEach(function(emp){
        var existing = EMPLOYEES.find(function(e){ return e.id === emp.id; });
        if (existing) {
          Object.assign(existing, emp);
          updated++;
        } else {
          // Ensure unique id
          var maxId = Math.max.apply(null, EMPLOYEES.map(function(e){return e.id;}));
          emp.id = maxId + 1;
          EMPLOYEES.push(emp);
          added++;
        }
      });
      
      saveToStorage();
      renderRecordList(document.getElementById('searchInput')?.value || '');
      showToast('已导入：更新'+updated+'条，新增'+added+'条');
    } catch(err) {
      alert('导入失败：文件格式不正确，请选择导出的 JSON 文件。');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function toggleHint(el) {
  var detail = el.parentElement.nextElementSibling;
  if (!detail || !detail.classList.contains('hint-detail')) return;
  if (detail.style.display === 'none') {
    detail.style.display = 'block';
    el.textContent = '▾ 话术参考';
  } else {
    detail.style.display = 'none';
    el.textContent = '▸ 话术参考';
  }
}

function scaleApp() {
  const wrapper = document.getElementById('app');
  const scale = Math.min(window.innerWidth / 1440, 1);
  wrapper.style.transform = 'scale('+scale+')';
  wrapper.style.width = '1440px';
}
window.addEventListener('resize', scaleApp);

renderRecordList();
loadData();  // fetch latest from cloud
setTimeout(scaleApp, 50);

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
</script>
